name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # On pull_request: only lint/build packages affected by the PR changes.
      # On push to main/dev: run everything.
      - name: Lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo lint --filter=...[origin/${{ github.base_ref }}]
          else
            pnpm turbo lint
          fi

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo build --filter=...[origin/${{ github.base_ref }}]
          else
            pnpm turbo build
          fi
        env:
          TURBO_TELEMETRY_DISABLED: 1
